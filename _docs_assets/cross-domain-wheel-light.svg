<svg xmlns="http://www.w3.org/2000/svg" viewBox="-60 0 720 600" role="img" aria-labelledby="wheel-title wheel-desc">
  <title id="wheel-title">Cross-domain wheel — one equation, seventeen instantiations</title>
  <desc id="wheel-desc">A radial diagram with the Memory-NLS equation at the centre and seventeen cross-domain substrates around it: NLS fields, baryon acoustic oscillations, cymatics, gamma neural entrainment, archaeoacoustic resonance, state space models, cosmological expansion, mechanistic interpretability, critical brain dynamics, Kuramoto synchronization, immune affinity maturation, Friston free-energy principle, active matter, self-organized criticality, cardiac dynamics, gene-regulation and circadian rhythm, ecosystem dynamics.</desc>

  <defs>
    <style>
      .text-color  { fill:   #1f1f1f; }
      .stroke-color { stroke: #1f1f1f; }
      .accent       { stroke: #0d9488; fill: none; }
      .accent-fill  { fill:   #0d9488; }
      .bg-color     { fill:   #fafaf9; }
      .spoke        { stroke: #1f1f1f; stroke-width: 0.8; opacity: 0.20; fill: none; }
      .ring-outer   { stroke: #1f1f1f; stroke-width: 0.6; opacity: 0.10; fill: none; }
      .ring-inner   { stroke: #0d9488; stroke-width: 1.4; opacity: 0.55; fill: none; }
      .pulse        { stroke: #0d9488; stroke-width: 1.0; fill: none; }
      .node-bg      { fill: #fafaf9; stroke: #1f1f1f; stroke-width: 1.3; }
      .node-hover-bg { fill: #0d9488; opacity: 0; transition: opacity 0.22s ease; }
      .node-icon    { stroke: #1f1f1f; stroke-width: 1.4; fill: none;
                       stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.22s ease; }
      .node-icon.filled { fill: #1f1f1f; stroke: none; transition: fill 0.22s ease; }
      .label        { font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                       font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
                       text-transform: uppercase; fill: #1f1f1f; opacity: 0.78;
                       dominant-baseline: middle; transition: fill 0.22s ease, opacity 0.22s ease; }
      .core-glyph   { font-family: "STIX Two Math", "Latin Modern Math", "Cambria Math", "Times New Roman", serif;
                       font-size: 72px; font-style: italic; font-weight: 400; fill: #0d9488;
                       text-anchor: middle; dominant-baseline: central; }
      .node         { cursor: pointer; }
      .node:hover .node-hover-bg { opacity: 1; }
      .node:hover .node-icon     { stroke: #ffffff; }
      .node:hover .node-icon.filled { fill: #ffffff; }
      .node:hover .label         { fill: #0d9488; opacity: 1; }
    </style>
  </defs>

  <!-- background reference rings -->
  <circle class="ring-outer" cx="300" cy="300" r="200"/>
  <circle class="ring-inner" cx="300" cy="300" r="60"/>

  <!-- expanding pulse rings: visual metaphor for cross-substrate propagation -->
  <circle class="pulse" cx="300" cy="300" opacity="0">
    <animate attributeName="r"       from="62"   to="200" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.40;0" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle class="pulse" cx="300" cy="300" opacity="0">
    <animate attributeName="r"       from="62"   to="200" dur="6s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.40;0" dur="6s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle class="pulse" cx="300" cy="300" opacity="0">
    <animate attributeName="r"       from="62"   to="200" dur="6s" begin="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.40;0" dur="6s" begin="4s" repeatCount="indefinite"/>
  </circle>

  <!-- spokes: inner ring (r=60) to node inner edge (r=174); 17 nodes at 21.18° spacing from θ=-90° -->
  <line class="spoke" x1="300.0" y1="240.0" x2="300.0" y2="126.0"/>
  <line class="spoke" x1="321.7" y1="244.1" x2="362.9" y2="137.7"/>
  <line class="spoke" x1="340.4" y1="255.7" x2="417.2" y2="171.4"/>
  <line class="spoke" x1="353.7" y1="273.3" x2="455.8" y2="222.5"/>
  <line class="spoke" x1="359.7" y1="294.5" x2="473.2" y2="284.0"/>
  <line class="spoke" x1="357.7" y1="316.4" x2="467.4" y2="347.6"/>
  <line class="spoke" x1="347.9" y1="336.2" x2="438.9" y2="404.9"/>
  <line class="spoke" x1="331.6" y1="351.0" x2="391.6" y2="447.9"/>
  <line class="spoke" x1="311.0" y1="359.0" x2="332.0" y2="471.0"/>
  <line class="spoke" x1="289.0" y1="359.0" x2="268.0" y2="471.0"/>
  <line class="spoke" x1="268.4" y1="351.0" x2="208.4" y2="447.9"/>
  <line class="spoke" x1="252.1" y1="336.2" x2="161.1" y2="404.9"/>
  <line class="spoke" x1="242.3" y1="316.4" x2="132.6" y2="347.6"/>
  <line class="spoke" x1="240.3" y1="294.5" x2="126.8" y2="284.0"/>
  <line class="spoke" x1="246.3" y1="273.3" x2="144.2" y2="222.5"/>
  <line class="spoke" x1="259.6" y1="255.7" x2="182.8" y2="171.4"/>
  <line class="spoke" x1="278.3" y1="244.1" x2="237.1" y2="137.7"/>

  <!-- centre glyph -->
  <text class="core-glyph" x="300" y="303">Ψ</text>

