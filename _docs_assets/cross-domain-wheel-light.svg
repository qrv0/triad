<svg xmlns="http://www.w3.org/2000/svg" viewBox="-60 0 720 600" role="img" aria-labelledby="wheel-title wheel-desc">
  <title id="wheel-title">Cross-domain wheel — one equation, nine instantiations</title>
  <desc id="wheel-desc">A radial diagram with the Memory-NLS equation at the centre and nine cross-domain substrates around it: NLS fields, baryon acoustic oscillations, cymatics, gamma neural entrainment, archaeoacoustic resonance, state space models, cosmological expansion, mechanistic interpretability of attention systems, and critical brain dynamics.</desc>

  <defs>
    <style>
      .text-color  { fill:   #1f1f1f; }
      .stroke-color { stroke: #1f1f1f; }
      .accent       { stroke: #0d9488; fill: none; }
      .accent-fill  { fill:   #0d9488; }
      .bg-color     { fill:   #fafaf9; }
      .spoke        { stroke: #1f1f1f; stroke-width: 0.9; opacity: 0.22; fill: none; }
      .ring-outer   { stroke: #1f1f1f; stroke-width: 0.7; opacity: 0.12; fill: none; }
      .ring-inner   { stroke: #0d9488; stroke-width: 1.5; opacity: 0.55; fill: none; }
      .pulse        { stroke: #0d9488; stroke-width: 1.1; fill: none; }
      .node-bg      { fill: #fafaf9; stroke: #1f1f1f; stroke-width: 1.5; }
      .node-hover-bg { fill: #0d9488; opacity: 0; transition: opacity 0.22s ease; }
      .node-icon    { stroke: #1f1f1f; stroke-width: 1.6; fill: none;
                       stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.22s ease; }
      .node-icon.filled { fill: #1f1f1f; stroke: none; transition: fill 0.22s ease; }
      .label        { font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                       font-size: 11px; font-weight: 600; letter-spacing: 0.10em;
                       text-transform: uppercase; fill: #1f1f1f; opacity: 0.78;
                       dominant-baseline: middle; transition: fill 0.22s ease, opacity 0.22s ease; }
      .core-glyph   { font-family: "STIX Two Math", "Latin Modern Math", "Cambria Math", "Times New Roman", serif;
                       font-size: 88px; font-style: italic; font-weight: 400; fill: #0d9488;
                       text-anchor: middle; dominant-baseline: central; }
      .node         { cursor: pointer; }
      .node:hover .node-hover-bg { opacity: 1; }
      .node:hover .node-icon     { stroke: #ffffff; }
      .node:hover .node-icon.filled { fill: #ffffff; }
      .node:hover .label         { fill: #0d9488; opacity: 1; }
    </style>
  </defs>

  <!-- background reference rings -->
  <circle class="ring-outer" cx="300" cy="300" r="200"/>
  <circle class="ring-inner" cx="300" cy="300" r="72"/>

  <!-- expanding pulse rings: visual metaphor for cross-substrate propagation -->
  <circle class="pulse" cx="300" cy="300" opacity="0">
    <animate attributeName="r"       from="74"   to="200" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.45;0" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle class="pulse" cx="300" cy="300" opacity="0">
    <animate attributeName="r"       from="74"   to="200" dur="6s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.45;0" dur="6s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle class="pulse" cx="300" cy="300" opacity="0">
    <animate attributeName="r"       from="74"   to="200" dur="6s" begin="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.45;0" dur="6s" begin="4s" repeatCount="indefinite"/>
  </circle>

  <!-- spokes: inner ring (r=72) to node inner edge (r=166); 9 nodes at 40° spacing from θ=-90° -->
  <line class="spoke" x1="300.0" y1="228.0" x2="300.0" y2="134.0"/>
  <line class="spoke" x1="346.3" y1="244.8" x2="406.7" y2="172.8"/>
  <line class="spoke" x1="370.9" y1="287.5" x2="463.5" y2="271.2"/>
  <line class="spoke" x1="362.4" y1="336.0" x2="443.8" y2="383.0"/>
  <line class="spoke" x1="324.6" y1="367.7" x2="356.8" y2="456.0"/>
  <line class="spoke" x1="275.4" y1="367.7" x2="243.2" y2="456.0"/>
  <line class="spoke" x1="237.6" y1="336.0" x2="156.2" y2="383.0"/>
  <line class="spoke" x1="229.1" y1="312.5" x2="136.5" y2="328.8"/>
  <line class="spoke" x1="253.7" y1="244.8" x2="193.3" y2="172.8"/>

  <!-- centre glyph -->
  <text class="core-glyph" x="300" y="304">Ψ</text>

  <!-- ============================================================ -->
  <!-- NODES                                                        -->
  <!-- Each node at radius 200 from centre, in a circle of r=34.    -->
  <!-- 9 substrates evenly spaced (40° apart), starting from top.   -->
  <!-- Labels positioned per-quadrant: middle (top/bottom),         -->
  <!-- start (right side), end (left side).                         -->
  <!-- ============================================================ -->

  <!-- 1. NLS Fields — top (θ=-90°), node (300, 100) -->
  <a class="node" href="interfaces/01-other-nls-systems/" aria-label="NLS fields">
    <circle class="node-bg" cx="300" cy="100" r="34"/>
    <circle class="node-hover-bg" cx="300" cy="100" r="34"/>
    <g transform="translate(300 100)">
      <path class="node-icon" d="M -15 0 C -10 -11 -5 -11 0 0 C 5 11 10 11 15 0"/>
    </g>
    <text class="label" x="300" y="50" text-anchor="middle">NLS FIELDS</text>
  </a>

  <!-- 2. BAO Cosmology — top-right (θ=-50°), node (429, 147) -->
  <a class="node" href="interfaces/02-baryon-acoustic/" aria-label="Baryon acoustic oscillations">
    <circle class="node-bg" cx="429" cy="147" r="34"/>
    <circle class="node-hover-bg" cx="429" cy="147" r="34"/>
    <g transform="translate(429 147)">
      <path class="node-icon filled" d="M 0 -14 L 3.6 -3.6 L 14 0 L 3.6 3.6 L 0 14 L -3.6 3.6 L -14 0 L -3.6 -3.6 Z"/>
      <line class="node-icon" x1="0" y1="-17" x2="0" y2="-20"/>
      <line class="node-icon" x1="0" y1="17" x2="0" y2="20"/>
      <line class="node-icon" x1="-17" y1="0" x2="-20" y2="0"/>
      <line class="node-icon" x1="17" y1="0" x2="20" y2="0"/>
    </g>
    <text class="label" x="473" y="140" text-anchor="start">BAO</text>
    <text class="label" x="473" y="156" text-anchor="start">COSMOLOGY</text>
  </a>

  <!-- 3. Cymatics — right (θ=-10°), node (497, 265) -->
  <a class="node" href="interfaces/03-chladni-cymatics/" aria-label="Chladni cymatics">
    <circle class="node-bg" cx="497" cy="265" r="34"/>
    <circle class="node-hover-bg" cx="497" cy="265" r="34"/>
    <g transform="translate(497 265)">
      <path class="node-icon" d="M 0 -13 L 11.3 -6.5 L 11.3 6.5 L 0 13 L -11.3 6.5 L -11.3 -6.5 Z"/>
      <path class="node-icon" d="M 0 -6.5 L 5.6 -3.3 L 5.6 3.3 L 0 6.5 L -5.6 3.3 L -5.6 -3.3 Z"/>
      <circle class="node-icon filled" cx="0" cy="0" r="1.5"/>
    </g>
    <text class="label" x="541" y="265" text-anchor="start">CYMATICS</text>
  </a>

  <!-- 4. Gamma Neural — bottom-right (θ=30°), node (473, 400) -->
  <a class="node" href="interfaces/04-gamma-entrainment/" aria-label="Gamma frequency neural entrainment">
    <circle class="node-bg" cx="473" cy="400" r="34"/>
    <circle class="node-hover-bg" cx="473" cy="400" r="34"/>
    <g transform="translate(473 400)">
      <path class="node-icon" d="M -14 0 Q -11.5 -8 -9 0 Q -6.5 8 -4 0 Q -1.5 -8 1 0 Q 3.5 8 6 0 Q 8.5 -8 11 0 Q 13 4 14 0"/>
    </g>
    <text class="label" x="517" y="393" text-anchor="start">GAMMA</text>
    <text class="label" x="517" y="409" text-anchor="start">NEURAL</text>
  </a>

  <!-- 5. Archaeoacoustic — bottom-right (θ=70°), node (357, 488) -->
  <a class="node" href="interfaces/05-archaeoacoustic-resonance/" aria-label="Archaeoacoustic resonance">
    <circle class="node-bg" cx="357" cy="488" r="34"/>
    <circle class="node-hover-bg" cx="357" cy="488" r="34"/>
    <g transform="translate(357 488)">
      <!-- lintel -->
      <path class="node-icon filled" d="M -14 -6 L 14 -6 L 14 -2 L -14 -2 Z"/>
      <!-- three columns -->
      <path class="node-icon filled" d="M -11 -2 L -7 -2 L -7 12 L -11 12 Z"/>
      <path class="node-icon filled" d="M -2 -2 L 2 -2 L 2 12 L -2 12 Z"/>
      <path class="node-icon filled" d="M 7 -2 L 11 -2 L 11 12 L 7 12 Z"/>
      <!-- ground -->
      <line class="node-icon" x1="-14" y1="13" x2="14" y2="13"/>
    </g>
    <text class="label" x="357" y="536" text-anchor="middle">ARCHAEO-</text>
    <text class="label" x="357" y="552" text-anchor="middle">ACOUSTIC</text>
  </a>

  <!-- 6. State Space Models — bottom-left (θ=110°), node (243, 488) -->
  <a class="node" href="interfaces/06-state-space-models/" aria-label="State space models">
    <circle class="node-bg" cx="243" cy="488" r="34"/>
    <circle class="node-hover-bg" cx="243" cy="488" r="34"/>
    <g transform="translate(243 488)">
      <rect class="node-icon" x="-11" y="-11" width="22" height="22" rx="1"/>
      <line class="node-icon" x1="-11" y1="-3.66" x2="11" y2="-3.66"/>
      <line class="node-icon" x1="-11" y1="3.66"  x2="11" y2="3.66"/>
      <line class="node-icon" x1="-3.66" y1="-11" x2="-3.66" y2="11"/>
      <line class="node-icon" x1="3.66"  y1="-11" x2="3.66"  y2="11"/>
    </g>
    <text class="label" x="243" y="536" text-anchor="middle">STATE SPACE</text>
    <text class="label" x="243" y="552" text-anchor="middle">MODELS</text>
  </a>

  <!-- 7. Cosmological Expansion — left (θ=150°), node (127, 400) -->
  <a class="node" href="interfaces/07-cosmological-expansion/" aria-label="Cosmological expansion">
    <circle class="node-bg" cx="127" cy="400" r="34"/>
    <circle class="node-hover-bg" cx="127" cy="400" r="34"/>
    <g transform="translate(127 400)">
      <circle class="node-icon filled" cx="0" cy="0" r="2"/>
      <circle class="node-icon" cx="0" cy="0" r="6.5"/>
      <circle class="node-icon" cx="0" cy="0" r="11" opacity="0.5"/>
    </g>
    <text class="label" x="83" y="393" text-anchor="end">COSMOLOGICAL</text>
    <text class="label" x="83" y="409" text-anchor="end">EXPANSION</text>
  </a>

  <!-- 8. Mechanistic Interpretability — left (θ=190°), node (103, 335) -->
  <a class="node" href="interfaces/08-mechanistic-interpretability/" aria-label="Mechanistic interpretability of attention systems">
    <circle class="node-bg" cx="103" cy="335" r="34"/>
    <circle class="node-hover-bg" cx="103" cy="335" r="34"/>
    <g transform="translate(103 335)">
      <!-- sparse-feature spectrum: baseline + four bars of varied height -->
      <line class="node-icon" x1="-13" y1="9" x2="13" y2="9"/>
      <path class="node-icon filled" d="M -11 -1 L -8 -1 L -8 9 L -11 9 Z"/>
      <path class="node-icon filled" d="M -5 3 L -2 3 L -2 9 L -5 9 Z"/>
      <path class="node-icon filled" d="M 1 -6 L 4 -6 L 4 9 L 1 9 Z"/>
      <path class="node-icon filled" d="M 7 4 L 10 4 L 10 9 L 7 9 Z"/>
    </g>
    <text class="label" x="59" y="328" text-anchor="end">MECHANISTIC</text>
    <text class="label" x="59" y="344" text-anchor="end">INTERP.</text>
  </a>

  <!-- 9. Critical Brain — top-left (θ=230°), node (171, 147) -->
  <a class="node" href="interfaces/09-critical-brain/" aria-label="Critical brain dynamics">
    <circle class="node-bg" cx="171" cy="147" r="34"/>
    <circle class="node-hover-bg" cx="171" cy="147" r="34"/>
    <g transform="translate(171 147)">
      <!-- branching avalanche: 1 → 2 → 4 nodes connected by lines -->
      <line class="node-icon" x1="0" y1="-11" x2="-6" y2="-1"/>
      <line class="node-icon" x1="0" y1="-11" x2="6" y2="-1"/>
      <line class="node-icon" x1="-6" y1="-1" x2="-9" y2="9"/>
      <line class="node-icon" x1="-6" y1="-1" x2="-3" y2="9"/>
      <line class="node-icon" x1="6" y1="-1" x2="3" y2="9"/>
      <line class="node-icon" x1="6" y1="-1" x2="9" y2="9"/>
      <circle class="node-icon filled" cx="0"  cy="-11" r="2"/>
      <circle class="node-icon filled" cx="-6" cy="-1"  r="2"/>
      <circle class="node-icon filled" cx="6"  cy="-1"  r="2"/>
      <circle class="node-icon filled" cx="-9" cy="9"   r="1.6"/>
      <circle class="node-icon filled" cx="-3" cy="9"   r="1.6"/>
      <circle class="node-icon filled" cx="3"  cy="9"   r="1.6"/>
      <circle class="node-icon filled" cx="9"  cy="9"   r="1.6"/>
    </g>
    <text class="label" x="127" y="140" text-anchor="end">CRITICAL</text>
    <text class="label" x="127" y="156" text-anchor="end">BRAIN</text>
  </a>

</svg>
