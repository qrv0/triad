<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" role="img" aria-label="Interface 21 Hawkes self-exciting point process visualization">
  <defs>
    <pattern id="grid-21-hawkes" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="currentColor" opacity="0.18"/>
    </pattern>
    <style>
      .glyph { stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
      .glyph-fill { fill: currentColor; opacity: 0.8; }
      .glyph-soft { stroke: currentColor; fill: none; stroke-width: 1; opacity: 0.5; }
      .glyph-intensity { stroke: currentColor; fill: none; stroke-width: 1.8; opacity: 0.85; }
      .tri-rail { stroke-width: 3; }
      .p1-rail { stroke: #6366f1; }
      .p2-rail { stroke: #0d9488; }
      .p3-rail { stroke: #d97706; }
      .tri-label { font-family: Inter, sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; fill: currentColor; opacity: 0.7; }
      .annot { font-family: 'JetBrains Mono', monospace; font-size: 8px; fill: currentColor; opacity: 0.7; }
    </style>
  </defs>
  <rect x="0" y="0" width="360" height="220" fill="url(#grid-21-hawkes)"/>
  <line class="glyph-soft" x1="30" y1="170" x2="330" y2="170"/>
  <line class="glyph-soft" x1="30" y1="60" x2="30" y2="170"/>
  <text class="annot" x="325" y="184">t</text>
  <text class="annot" x="15" y="65" transform="rotate(-90 15 65)">λ(t)</text>
  <line class="glyph-soft" x1="30" y1="155" x2="330" y2="155" stroke-dasharray="2 3"/>
  <text class="annot" x="335" y="158">μ</text>
  <path class="glyph-intensity" d="
    M 30 155
    L 60 155 L 60 100 Q 80 130 100 145 Q 105 150 110 155
    L 130 155 L 130 80 Q 150 110 170 140 Q 175 150 180 155
    L 195 155 L 195 110 Q 210 135 225 150 Q 230 152 235 155
    L 250 155 L 250 95 Q 265 125 280 145 Q 290 152 300 155
    L 330 155
  "/>
  <g class="glyph-fill">
    <circle cx="60" cy="170" r="3"/>
    <circle cx="130" cy="170" r="3"/>
    <circle cx="195" cy="170" r="3"/>
    <circle cx="250" cy="170" r="3"/>
  </g>
  <g transform="translate(60 170)">
    <line class="glyph" x1="0" y1="-3" x2="0" y2="3"/>
  </g>
  <g transform="translate(130 170)">
    <line class="glyph" x1="0" y1="-3" x2="0" y2="3"/>
  </g>
  <g transform="translate(195 170)">
    <line class="glyph" x1="0" y1="-3" x2="0" y2="3"/>
  </g>
  <g transform="translate(250 170)">
    <line class="glyph" x1="0" y1="-3" x2="0" y2="3"/>
  </g>
  <g transform="translate(50 38)">
    <text class="annot" x="0" y="0" style="font-size:9px">dλₜ = -β(λₜ-μ)dt + αβ·dNₜ</text>
  </g>
  <line class="tri-rail p1-rail" x1="18" y1="20" x2="60" y2="20"/>
  <text class="tri-label" x="18" y="38">P1</text>
  <line class="tri-rail p2-rail" x1="300" y1="20" x2="342" y2="20"/>
  <text class="tri-label" x="300" y="38">P2</text>
  <line class="tri-rail p3-rail" x1="18" y1="188" x2="60" y2="188"/>
  <text class="tri-label" x="18" y="206">P3</text>
</svg>
