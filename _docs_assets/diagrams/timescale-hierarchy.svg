<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" role="img" aria-labelledby="ts-title">
  <title id="ts-title">Memory timescale hierarchy — fast and slow modes</title>

  <style>
    .title    { font: 600 11px Inter, sans-serif; fill: currentColor; opacity: 0.55; text-transform: uppercase; letter-spacing: 0.1em; }
    .axis     { stroke: currentColor; stroke-width: 0.7; opacity: 0.35; fill: none; }
    .tick     { stroke: currentColor; stroke-width: 0.7; opacity: 0.35; }
    .tick-lbl { font: 10px Inter, sans-serif; fill: currentColor; opacity: 0.55; font-feature-settings: "tnum"; }
    .mode     { fill: #14b8a6; opacity: 0.85; }
    .mode-lbl { font: 600 12px "JetBrains Mono", monospace; fill: #14b8a6; }
    .mode-sub { font: 10.5px Inter, sans-serif; fill: currentColor; opacity: 0.78; }
    .bio-band { fill: #f59e0b; opacity: 0.15; }
    .bio-lbl  { font: 600 10px Inter, sans-serif; fill: #d97706; text-transform: uppercase; letter-spacing: 0.06em; }
    .bio-sub  { font: 9.5px Inter, sans-serif; fill: currentColor; opacity: 0.65; }
    .axis-lbl { font: 600 10px Inter, sans-serif; fill: currentColor; opacity: 0.55; letter-spacing: 0.04em; text-transform: uppercase; }
    .scale-lbl{ font: italic 10px Inter, sans-serif; fill: currentColor; opacity: 0.55; }
  </style>

  <!-- Title -->
  <text class="title" x="50" y="22">Memory timescale hierarchy</text>

  <!-- Biological-analogue bands (background) -->
  <!-- Working memory / hippocampus: τ ~ 100 ms to 1 s -->
  <rect class="bio-band" x="100" y="50" width="180" height="30"/>
  <text class="bio-lbl" x="190" y="68" text-anchor="middle">Hippocampal CA3 · working memory</text>
  <text class="bio-sub" x="190" y="80" text-anchor="middle">τ ≈ 100 ms – 1 s</text>

  <!-- Long-term consolidation / neocortex: τ ~ 1 s to minutes -->
  <rect class="bio-band" x="380" y="50" width="220" height="30"/>
  <text class="bio-lbl" x="490" y="68" text-anchor="middle">Neocortical consolidation · LTM</text>
  <text class="bio-sub" x="490" y="80" text-anchor="middle">τ ≈ 1 s – minutes</text>

  <!-- Axis with log-spaced ticks -->
  <line class="axis" x1="50" y1="130" x2="650" y2="130"/>

  <!-- Ticks at log positions (representing ν in computational units) -->
  <!-- ν=100 → fast (left), ν=0.01 → slow (right) -->
  <!-- Log span: log10(100)=2 to log10(0.01)=-2, so 4 decades over 600px = 150px/decade -->
  <line class="tick" x1="100" y1="125" x2="100" y2="135"/>
  <text class="tick-lbl" x="100" y="148" text-anchor="middle">ν=100</text>
  <text class="scale-lbl" x="100" y="161" text-anchor="middle">τ=0.01</text>

  <line class="tick" x1="220" y1="125" x2="220" y2="135"/>
  <text class="tick-lbl" x="220" y="148" text-anchor="middle">ν=10</text>
  <text class="scale-lbl" x="220" y="161" text-anchor="middle">τ=0.1</text>

  <line class="tick" x1="340" y1="125" x2="340" y2="135"/>
  <text class="tick-lbl" x="340" y="148" text-anchor="middle">ν=1</text>
  <text class="scale-lbl" x="340" y="161" text-anchor="middle">τ=1</text>

  <line class="tick" x1="460" y1="125" x2="460" y2="135"/>
  <text class="tick-lbl" x="460" y="148" text-anchor="middle">ν=0.1</text>
  <text class="scale-lbl" x="460" y="161" text-anchor="middle">τ=10</text>

  <line class="tick" x1="580" y1="125" x2="580" y2="135"/>
  <text class="tick-lbl" x="580" y="148" text-anchor="middle">ν=0.01</text>
  <text class="scale-lbl" x="580" y="161" text-anchor="middle">τ=100</text>

  <!-- Memory-NLS mode markers -->
  <!-- Fast mode: ν=10 → position 220 -->
  <circle class="mode" cx="220" cy="100" r="7"/>
  <line class="axis" x1="220" y1="107" x2="220" y2="125" stroke="#14b8a6" opacity="0.7"/>
  <text class="mode-lbl" x="220" y="38" text-anchor="middle">fast mode</text>
  <text class="mode-sub" x="220" y="92" text-anchor="middle">ν = 10</text>

  <!-- Slow mode: ν=0.5 → between 340 and 460, closer to 340. log(0.5)=-0.3, so position = 340 + 0.3*120 = 376 -->
  <circle class="mode" cx="376" cy="100" r="7"/>
  <line class="axis" x1="376" y1="107" x2="376" y2="125" stroke="#14b8a6" opacity="0.7"/>
  <text class="mode-lbl" x="376" y="38" text-anchor="middle">slow mode</text>
  <text class="mode-sub" x="376" y="92" text-anchor="middle">ν = 0.5</text>

  <!-- Footer axis label -->
  <text class="axis-lbl" x="50" y="190">relaxation rate ν  ← faster ・ slower →</text>
  <text class="scale-lbl" x="650" y="190" text-anchor="end">log scale, computational units</text>

  <!-- Bottom callout -->
  <text class="mode-sub" x="350" y="210" text-anchor="middle">The two structural memory modes of the equation occupy positions analogous to the biological short-term / long-term consolidation pipeline.</text>
</svg>
