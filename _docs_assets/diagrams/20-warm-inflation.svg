<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" role="img" aria-label="Interface 20 warm inflation Langevin scalar field visualization">
  <defs>
    <pattern id="grid-20-warm" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="currentColor" opacity="0.18"/>
    </pattern>
    <style>
      .glyph { stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
      .glyph-fill { fill: currentColor; opacity: 0.8; }
      .glyph-soft { stroke: currentColor; fill: none; stroke-width: 1; opacity: 0.45; }
      .glyph-noise { stroke: currentColor; fill: none; stroke-width: 1; opacity: 0.6; stroke-dasharray: 2 2; }
      .tri-rail { stroke-width: 3; }
      .p1-rail { stroke: #6366f1; }
      .p2-rail { stroke: #0d9488; }
      .p3-rail { stroke: #d97706; }
      .tri-label { font-family: Inter, sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; fill: currentColor; opacity: 0.7; }
      .annot { font-family: 'JetBrains Mono', monospace; font-size: 8px; fill: currentColor; opacity: 0.7; }
    </style>
  </defs>
  <rect x="0" y="0" width="360" height="220" fill="url(#grid-20-warm)"/>
  <g transform="translate(60 160)">
    <path class="glyph" d="M 0 0 Q 50 -120 120 -60 Q 160 -25 240 -10"/>
    <circle class="glyph-fill" cx="20" cy="-50" r="5"/>
    <path class="glyph-noise" d="M 18 -53 L 22 -47 M 14 -50 L 26 -50 M 18 -47 L 22 -53"/>
    <line class="glyph" x1="20" y1="-45" x2="60" y2="-65"/>
    <polygon class="glyph-fill" points="58,-65 64,-67 60,-60" opacity="0.7"/>
    <text class="annot" x="30" y="-30" style="font-size:9px">φ</text>
    <text class="annot" x="200" y="-30">V(φ)</text>
  </g>
  <g transform="translate(220 70)">
    <path class="glyph-soft" d="M -25 0 Q -15 -8 -5 0 Q 5 8 15 0 Q 25 -8 35 0"/>
    <path class="glyph-soft" d="M -25 10 Q -15 2 -5 10 Q 5 18 15 10 Q 25 2 35 10"/>
    <path class="glyph-soft" d="M -25 -10 Q -15 -18 -5 -10 Q 5 -2 15 -10 Q 25 -18 35 -10"/>
    <text class="annot" x="-25" y="-18" style="font-size:9px">bath T</text>
    <text class="annot" x="-25" y="32" style="font-size:8px">ξ(t): 2ΥT·δ</text>
  </g>
  <g transform="translate(80 50)">
    <text class="annot" x="0" y="0" style="font-size:9px;opacity:0.9">φ̈ + (3H+Υ)φ̇</text>
    <text class="annot" x="0" y="14" style="font-size:9px;opacity:0.9">+ V'(φ) = ξ(t)</text>
  </g>
  <line class="tri-rail p1-rail" x1="18" y1="20" x2="60" y2="20"/>
  <text class="tri-label" x="18" y="38">P1</text>
  <line class="tri-rail p2-rail" x1="300" y1="20" x2="342" y2="20"/>
  <text class="tri-label" x="300" y="38">P2</text>
  <line class="tri-rail p3-rail" x1="18" y1="188" x2="60" y2="188"/>
  <text class="tri-label" x="18" y="206">P3</text>
</svg>
