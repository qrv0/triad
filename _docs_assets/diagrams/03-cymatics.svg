<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" role="img" aria-label="Interface 03 structural triangle visualization">
  <defs>
    <pattern id="grid-03-cymatics" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="currentColor" opacity="0.18"/>
    </pattern>
    <style>
      .glyph { stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
      .glyph-fill { fill: currentColor; opacity: 0.8; }
      .glyph-soft { stroke: currentColor; fill: none; stroke-width: 1; opacity: 0.5; stroke-dasharray: 3 3; }
      .tri-rail { stroke-width: 3; }
      .p1-rail { stroke: #6366f1; }
      .p2-rail { stroke: #0d9488; }
      .p3-rail { stroke: #d97706; }
      .tri-label { font-family: Inter, sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; fill: currentColor; opacity: 0.7; }
    </style>
  </defs>
  <rect x="0" y="0" width="360" height="220" fill="url(#grid-03-cymatics)"/>
  <g transform="translate(180 115)">
    <!-- Chladni nodal pattern : crossed sinusoidal modes -->
    <path class="glyph" d="M-100 -40 L-50 -40 L-50 40 L-100 40 Z"/>
    <path class="glyph" d="M-40 -40 L10 -40 L10 40 L-40 40 Z"/>
    <path class="glyph" d="M20 -40 L70 -40 L70 40 L20 40 Z"/>
    <path class="glyph" d="M80 -40 L130 -40 L130 40 L80 40 Z"/>
    <circle class="glyph-fill" cx="-75" cy="0" r="2"/>
    <circle class="glyph-fill" cx="-15" cy="0" r="2"/>
    <circle class="glyph-fill" cx="45" cy="0" r="2"/>
    <circle class="glyph-fill" cx="105" cy="0" r="2"/>
  </g>
  <line class="tri-rail p1-rail" x1="18" y1="20" x2="60" y2="20"/>
  <text class="tri-label" x="18" y="38">P1</text>
  <line class="tri-rail p2-rail" x1="300" y1="20" x2="342" y2="20"/>
  <text class="tri-label" x="300" y="38">P2</text>
  <line class="tri-rail p3-rail" x1="18" y1="188" x2="60" y2="188"/>
  <text class="tri-label" x="18" y="206">P3</text>
</svg>
