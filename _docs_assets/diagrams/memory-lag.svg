<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" role="img" aria-labelledby="memlag-title">
  <title id="memlag-title">Memory lag — the mechanism behind anti-collapse</title>

  <style>
    .axis        { stroke: currentColor; stroke-width: 0.8; opacity: 0.4; fill: none; }
    .grid        { stroke: currentColor; stroke-width: 0.4; opacity: 0.08; }
    .density-l   { stroke: #f87171; stroke-width: 2.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .memory-l    { stroke: #14b8a6; stroke-width: 2.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .density-a   { fill: #f87171; opacity: 0.07; }
    .memory-a    { fill: #14b8a6; opacity: 0.07; }
    .overshoot   { fill: #f59e0b; opacity: 0.14; }
    .label       { font: 600 12px Inter, -apple-system, "Segoe UI", sans-serif; fill: currentColor; }
    .density-lbl { fill: #f87171; }
    .memory-lbl  { fill: #14b8a6; }
    .callout     { font: 10.5px Inter, -apple-system, sans-serif; fill: currentColor; opacity: 0.78; }
    .callout-em  { font-weight: 600; fill: #f59e0b; }
    .arrow       { stroke: currentColor; stroke-width: 1; opacity: 0.5; fill: none; }
    .axis-lbl    { font: 600 10px Inter, sans-serif; fill: currentColor; opacity: 0.55; letter-spacing: 0.04em; text-transform: uppercase; }
  </style>

  <defs>
    <marker id="arrowhead-ml" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="currentColor" opacity="0.5"/>
    </marker>
  </defs>

  <!-- Subtle grid -->
  <line class="grid" x1="60" y1="160" x2="560" y2="160"/>
  <line class="grid" x1="60" y1="110" x2="560" y2="110"/>

  <!-- Overshoot region between memory peak and density tail -->
  <path class="overshoot"
        d="M 290 65 Q 330 40, 365 65 L 365 220 Q 320 230, 290 220 Z"/>

  <!-- Density curve: sharp early peak -->
  <path class="density-a"
        d="M 60 220 Q 180 220, 230 80 Q 255 50, 280 75 Q 320 220, 560 220 Z"/>
  <path class="density-l"
        d="M 60 220 Q 180 220, 230 80 Q 255 50, 280 75 Q 320 220, 560 220"/>

  <!-- Memory curve: later peak, lagged -->
  <path class="memory-a"
        d="M 60 220 Q 240 220, 310 70 Q 340 45, 370 65 Q 430 220, 560 220 Z"/>
  <path class="memory-l"
        d="M 60 220 Q 240 220, 310 70 Q 340 45, 370 65 Q 430 220, 560 220"/>

  <!-- Curve labels -->
  <text class="label density-lbl" x="200" y="68" text-anchor="end">ρ(t) = |Ψ|²</text>
  <text class="callout" x="200" y="84" text-anchor="end">field density</text>
  <text class="callout" x="200" y="98" text-anchor="end">rises fast</text>

  <text class="label memory-lbl" x="480" y="68" text-anchor="start">V<tspan dy="3" font-size="9">mem</tspan><tspan dy="-3">(t)</tspan></text>
  <text class="callout" x="480" y="84" text-anchor="start">memory potential</text>
  <text class="callout" x="480" y="98" text-anchor="start">lags by ~ 1/ν<tspan dy="3" font-size="8">slow</tspan></text>

  <!-- Lag indicator arrow -->
  <line class="arrow" x1="255" y1="50" x2="345" y2="45" marker-end="url(#arrowhead-ml)"/>
  <text class="callout" x="300" y="35" text-anchor="middle">temporal lag</text>

  <!-- Result annotation in overshoot region -->
  <text class="callout-em" x="328" y="155" text-anchor="middle" font-size="11">overshoot</text>
  <text class="callout" x="328" y="170" text-anchor="middle">V<tspan dy="2" font-size="8">mem</tspan><tspan dy="-2"> &gt; Λ|Ψ|²</tspan></text>
  <text class="callout" x="328" y="184" text-anchor="middle">→ repulsive</text>
  <text class="callout" x="328" y="198" text-anchor="middle">→ anti-collapse</text>

  <!-- Axes -->
  <line class="axis" x1="60" y1="220" x2="560" y2="220"/>
  <line class="axis" x1="60" y1="40"  x2="60"  y2="220"/>

  <!-- Axis labels -->
  <text class="axis-lbl" x="560" y="240" text-anchor="end">time</text>
  <text class="axis-lbl" x="50"  y="50"  text-anchor="end">ampl.</text>
</svg>
