<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" role="img" aria-labelledby="freq-title">
  <title id="freq-title">Neural frequency bands and Memory-NLS modes</title>

  <style>
    .band-label { font: 600 9.5px Inter, sans-serif; fill: currentColor; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.08em; }
    .tick-label { font: 10px Inter, sans-serif; fill: currentColor; opacity: 0.65; font-feature-settings: "tnum"; }
    .axis       { stroke: currentColor; stroke-width: 0.7; opacity: 0.35; }
    .marker     { stroke: #14b8a6; stroke-width: 1.4; fill: none; }
    .marker-lbl { font: 600 10.5px Inter, sans-serif; fill: #14b8a6; }
    .marker-sub { font: 9.5px Inter, sans-serif; fill: currentColor; opacity: 0.75; }
    .eq-note    { font: italic 11px Inter, sans-serif; fill: currentColor; opacity: 0.7; }
    .title      { font: 600 11px Inter, sans-serif; fill: currentColor; opacity: 0.55; text-transform: uppercase; letter-spacing: 0.1em; }
  </style>

  <!-- Title -->
  <text class="title" x="50" y="22">Frequency bands · Hz</text>

  <!-- Frequency-band blocks (log-spaced visually for clarity) -->
  <!-- delta 1-4 Hz -->
  <rect x="50"  y="50" width="34" height="38" fill="#6366f1" opacity="0.22"/>
  <text class="band-label" x="67"  y="103" text-anchor="middle">delta</text>
  <text class="band-label" x="67"  y="115" text-anchor="middle">1–4</text>

  <!-- theta 4-8 -->
  <rect x="84" y="50" width="46" height="38" fill="#3b82f6" opacity="0.25"/>
  <text class="band-label" x="107" y="103" text-anchor="middle">theta</text>
  <text class="band-label" x="107" y="115" text-anchor="middle">4–8</text>

  <!-- alpha 8-13 -->
  <rect x="130" y="50" width="56" height="38" fill="#06b6d4" opacity="0.27"/>
  <text class="band-label" x="158" y="103" text-anchor="middle">alpha</text>
  <text class="band-label" x="158" y="115" text-anchor="middle">8–13</text>

  <!-- beta 13-30 -->
  <rect x="186" y="50" width="100" height="38" fill="#10b981" opacity="0.27"/>
  <text class="band-label" x="236" y="103" text-anchor="middle">beta</text>
  <text class="band-label" x="236" y="115" text-anchor="middle">13–30</text>

  <!-- gamma 30-80 -->
  <rect x="286" y="50" width="180" height="38" fill="#f59e0b" opacity="0.3"/>
  <text class="band-label" x="376" y="103" text-anchor="middle">gamma</text>
  <text class="band-label" x="376" y="115" text-anchor="middle">30–80</text>

  <!-- high-gamma 80-200 -->
  <rect x="466" y="50" width="170" height="38" fill="#ef4444" opacity="0.28"/>
  <text class="band-label" x="551" y="103" text-anchor="middle">high-gamma</text>
  <text class="band-label" x="551" y="115" text-anchor="middle">80–200</text>

  <!-- Frequency axis ticks -->
  <line class="axis" x1="50" y1="88" x2="636" y2="88"/>
  <text class="tick-label" x="50"  y="78" text-anchor="middle">0</text>
  <text class="tick-label" x="186" y="78" text-anchor="middle">10</text>
  <text class="tick-label" x="286" y="78" text-anchor="middle">30</text>
  <text class="tick-label" x="466" y="78" text-anchor="middle">80</text>
  <text class="tick-label" x="636" y="78" text-anchor="middle">200</text>

  <!-- Memory-NLS predicted modes (markers + labels) -->
  <!-- mode at 22 Hz - 3D crystalline median -->
  <line class="marker" x1="252" y1="135" x2="252" y2="170"/>
  <circle cx="252" cy="135" r="3.5" fill="#14b8a6"/>
  <text class="marker-lbl" x="252" y="186" text-anchor="middle">22 Hz</text>
  <text class="marker-sub" x="252" y="200" text-anchor="middle">3D crystalline</text>
  <text class="marker-sub" x="252" y="213" text-anchor="middle">median mode</text>

  <!-- mode at 40 Hz - GENUS / gamma binding -->
  <line class="marker" x1="316" y1="135" x2="316" y2="170"/>
  <circle cx="316" cy="135" r="3.5" fill="#14b8a6"/>
  <text class="marker-lbl" x="316" y="186" text-anchor="middle">40 Hz</text>
  <text class="marker-sub" x="316" y="200" text-anchor="middle">GENUS</text>
  <text class="marker-sub" x="316" y="213" text-anchor="middle">γ binding</text>

  <!-- mode at 66 Hz - 2D fundamental -->
  <line class="marker" x1="394" y1="135" x2="394" y2="170"/>
  <circle cx="394" cy="135" r="3.5" fill="#14b8a6"/>
  <text class="marker-lbl" x="394" y="186" text-anchor="middle">66 Hz</text>
  <text class="marker-sub" x="394" y="200" text-anchor="middle">2D crystalline</text>
  <text class="marker-sub" x="394" y="213" text-anchor="middle">median mode</text>

  <!-- mode at 110 Hz - secondary / Cook-Pajot / Newgrange -->
  <line class="marker" x1="500" y1="135" x2="500" y2="170"/>
  <circle cx="500" cy="135" r="3.5" fill="#14b8a6"/>
  <text class="marker-lbl" x="500" y="186" text-anchor="middle">110 Hz</text>
  <text class="marker-sub" x="500" y="200" text-anchor="middle">2D 2nd mode</text>
  <text class="marker-sub" x="500" y="213" text-anchor="middle">Cook-Pajot · Newgrange</text>

  <!-- Hz axis end label -->
  <text class="title" x="650" y="100">Hz</text>

  <!-- Bottom note -->
  <text class="eq-note" x="350" y="245" text-anchor="middle">
    Equation modes shown under their respective dimensional calibrations.
    Each is independently derivable from the field structure.
  </text>
</svg>
