<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" role="img" aria-label="Interface 13 structural triangle visualization">
  <defs>
    <pattern id="grid-13-active-matter" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="currentColor" opacity="0.18"/>
    </pattern>
    <style>
      .glyph { stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
      .glyph-fill { fill: currentColor; opacity: 0.8; }
      .glyph-soft { stroke: currentColor; fill: none; stroke-width: 1; opacity: 0.5; stroke-dasharray: 3 3; }
      .tri-rail { stroke-width: 3; }
      .p1-rail { stroke: #6366f1; }
      .p2-rail { stroke: #0d9488; }
      .p3-rail { stroke: #d97706; }
      .tri-label { font-family: Inter, sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; fill: currentColor; opacity: 0.7; }
    </style>
  </defs>
  <rect x="0" y="0" width="360" height="220" fill="url(#grid-13-active-matter)"/>
  <g transform="translate(180 115)">
    <!-- Flock of self-propelled arrows -->
    <g transform="translate(-90 -20)"><path class="glyph" d="M0 0 L12 -3 L8 3 Z" fill="currentColor"/></g>
    <g transform="translate(-50 -10)"><path class="glyph" d="M0 0 L12 -3 L8 3 Z" fill="currentColor"/></g>
    <g transform="translate(-20 -25)"><path class="glyph" d="M0 0 L12 -3 L8 3 Z" fill="currentColor"/></g>
    <g transform="translate(20 -10)"><path class="glyph" d="M0 0 L12 -3 L8 3 Z" fill="currentColor"/></g>
    <g transform="translate(50 -20)"><path class="glyph" d="M0 0 L12 -3 L8 3 Z" fill="currentColor"/></g>
    <g transform="translate(80 -5)"><path class="glyph" d="M0 0 L12 -3 L8 3 Z" fill="currentColor"/></g>
    <g transform="translate(-70 20)"><path class="glyph" d="M0 0 L12 -3 L8 3 Z" fill="currentColor"/></g>
    <g transform="translate(-30 30)"><path class="glyph" d="M0 0 L12 -3 L8 3 Z" fill="currentColor"/></g>
    <g transform="translate(15 20)"><path class="glyph" d="M0 0 L12 -3 L8 3 Z" fill="currentColor"/></g>
    <g transform="translate(60 25)"><path class="glyph" d="M0 0 L12 -3 L8 3 Z" fill="currentColor"/></g>
  </g>
  <line class="tri-rail p1-rail" x1="18" y1="20" x2="60" y2="20"/>
  <text class="tri-label" x="18" y="38">P1</text>
  <line class="tri-rail p2-rail" x1="300" y1="20" x2="342" y2="20"/>
  <text class="tri-label" x="300" y="38">P2</text>
  <line class="tri-rail p3-rail" x1="18" y1="188" x2="60" y2="188"/>
  <text class="tri-label" x="18" y="206">P3</text>
</svg>
