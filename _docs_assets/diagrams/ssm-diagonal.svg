<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" role="img" aria-labelledby="ssm-title">
  <title id="ssm-title">SSM diagonal state — Memory-NLS correspondence</title>

  <style>
    .matrix-bg     { fill: var(--mnsm-quiet-bg, rgba(0,0,0,0.04)); stroke: currentColor; stroke-width: 0.7; opacity: 0.6; }
    .cell          { fill: transparent; stroke: currentColor; stroke-width: 0.35; opacity: 0.2; }
    .cell-diag     { fill: #14b8a6; stroke: none; opacity: 0.18; }
    .cell-diag-txt { font: 600 11px "JetBrains Mono", monospace; fill: #14b8a6; text-anchor: middle; }
    .label         { font: 600 12px Inter, sans-serif; fill: currentColor; }
    .mono          { font: 600 13px "JetBrains Mono", monospace; fill: currentColor; }
    .arrow         { stroke: #14b8a6; stroke-width: 1.6; fill: none; }
    .callout       { font: 11px Inter, sans-serif; fill: currentColor; opacity: 0.78; }
    .callout-em    { font-weight: 600; fill: #14b8a6; }
    .title         { font: 600 11px Inter, sans-serif; fill: currentColor; opacity: 0.55; text-transform: uppercase; letter-spacing: 0.1em; }
  </style>

  <defs>
    <marker id="arrowhead-ssm" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#14b8a6"/>
    </marker>
  </defs>

  <!-- Title -->
  <text class="title" x="50" y="22">Structural correspondence</text>

  <!-- LHS: physics notation -->
  <text class="label" x="100" y="60" text-anchor="middle">PHYSICS</text>
  <text class="mono" x="100" y="120" text-anchor="middle">∂<tspan dy="3" font-size="9">t</tspan><tspan dy="-3"> y</tspan><tspan dy="3" font-size="9">j</tspan><tspan dy="-3"> = ν</tspan><tspan dy="3" font-size="9">j</tspan><tspan dy="-3"> (ρ − y</tspan><tspan dy="3" font-size="9">j</tspan><tspan dy="-3">)</tspan></text>
  <text class="callout" x="100" y="148" text-anchor="middle">auxiliary-field</text>
  <text class="callout" x="100" y="162" text-anchor="middle">Mori–Zwanzig</text>
  <text class="callout" x="100" y="176" text-anchor="middle">projection</text>

  <!-- Equivalence arrow with label -->
  <line class="arrow" x1="170" y1="120" x2="240" y2="120" marker-end="url(#arrowhead-ssm)"/>
  <line class="arrow" x1="240" y1="124" x2="170" y2="124" marker-end="url(#arrowhead-ssm)"/>
  <text class="callout-em" x="205" y="100" text-anchor="middle">same</text>
  <text class="callout-em" x="205" y="114" text-anchor="middle">equation</text>

  <!-- Centre: the diagonal matrix structure -->
  <g transform="translate(290, 60)">
    <text class="label" x="60" y="0" text-anchor="middle">DIAGONAL STATE STRUCTURE</text>

    <!-- 5x5 diagonal matrix -->
    <g transform="translate(0, 20)">
      <!-- Background -->
      <rect class="matrix-bg" x="0" y="0" width="120" height="120" rx="2"/>

      <!-- Grid cells -->
      <g>
        <rect class="cell" x="0"  y="0"   width="24" height="24"/>
        <rect class="cell" x="24" y="0"   width="24" height="24"/>
        <rect class="cell" x="48" y="0"   width="24" height="24"/>
        <rect class="cell" x="72" y="0"   width="24" height="24"/>
        <rect class="cell" x="96" y="0"   width="24" height="24"/>

        <rect class="cell" x="0"  y="24"  width="24" height="24"/>
        <rect class="cell" x="24" y="24"  width="24" height="24"/>
        <rect class="cell" x="48" y="24"  width="24" height="24"/>
        <rect class="cell" x="72" y="24"  width="24" height="24"/>
        <rect class="cell" x="96" y="24"  width="24" height="24"/>

        <rect class="cell" x="0"  y="48"  width="24" height="24"/>
        <rect class="cell" x="24" y="48"  width="24" height="24"/>
        <rect class="cell" x="48" y="48"  width="24" height="24"/>
        <rect class="cell" x="72" y="48"  width="24" height="24"/>
        <rect class="cell" x="96" y="48"  width="24" height="24"/>

        <rect class="cell" x="0"  y="72"  width="24" height="24"/>
        <rect class="cell" x="24" y="72"  width="24" height="24"/>
        <rect class="cell" x="48" y="72"  width="24" height="24"/>
        <rect class="cell" x="72" y="72"  width="24" height="24"/>
        <rect class="cell" x="96" y="72"  width="24" height="24"/>

        <rect class="cell" x="0"  y="96"  width="24" height="24"/>
        <rect class="cell" x="24" y="96"  width="24" height="24"/>
        <rect class="cell" x="48" y="96"  width="24" height="24"/>
        <rect class="cell" x="72" y="96"  width="24" height="24"/>
        <rect class="cell" x="96" y="96"  width="24" height="24"/>
      </g>

      <!-- Diagonal entries highlighted -->
      <rect class="cell-diag" x="0"  y="0"   width="24" height="24"/>
      <rect class="cell-diag" x="24" y="24"  width="24" height="24"/>
      <rect class="cell-diag" x="48" y="48"  width="24" height="24"/>
      <rect class="cell-diag" x="72" y="72"  width="24" height="24"/>
      <rect class="cell-diag" x="96" y="96"  width="24" height="24"/>

      <text class="cell-diag-txt" x="12"  y="16">−ν₁</text>
      <text class="cell-diag-txt" x="36"  y="40">−ν₂</text>
      <text class="cell-diag-txt" x="60"  y="64">−ν₃</text>
      <text class="cell-diag-txt" x="84"  y="88">−ν₄</text>
      <text class="cell-diag-txt" x="108" y="112">−ν₅</text>
    </g>

    <text class="callout" x="60" y="160" text-anchor="middle">matrix A — diagonal eigenvalues</text>
  </g>

  <!-- RHS: ML notation -->
  <text class="label" x="560" y="60" text-anchor="middle">MACHINE LEARNING</text>
  <text class="mono" x="560" y="120" text-anchor="middle">∂<tspan dy="3" font-size="9">t</tspan><tspan dy="-3"> h = A h + B u</tspan></text>
  <text class="callout" x="560" y="148" text-anchor="middle">structured</text>
  <text class="callout" x="560" y="162" text-anchor="middle">state space model</text>
  <text class="callout" x="560" y="176" text-anchor="middle">(S4 / Mamba / RWKV)</text>

  <!-- Bottom annotation -->
  <text class="callout" x="350" y="245" text-anchor="middle">Aux fields y_j  ≡  SSM hidden states h_j.  Relaxation rates ν_j  ≡  negated eigenvalues.</text>
  <text class="callout-em" x="350" y="262" text-anchor="middle">No calibration. No approximation. Same equation.</text>
</svg>
