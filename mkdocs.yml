            'Three-Dimensional Form': Forma Tridimensional
            'Reductions to Known Equations': Reduções a Equações Conhecidas
            Results: Resultados
            'Cross-Domain Interfaces': Interfaces Cross-Domain
            'Other NLS Systems': Outros Sistemas NLS
            'Baryon Acoustic Oscillations': Oscilações Acústicas de Bárions
            'Chladni Cymatics': Cimática de Chladni
            'Gamma-Frequency Entrainment': Entrainment de Frequência Gama
            'Archaeoacoustic Resonance': Ressonância Arqueoacústica
