            'Repository Structure': Estrutura do Repositório
            'Contributing': Contribuindo
            'AI Assistant Guidelines': Diretrizes para Assistentes de IA
        - locale: es
          name: Español
          build: true
          link: /es/
          site_name: mnsm
          site_description: >-
            Modelos de Estado de Memoria-No-Lineales — tres principios
            estructurales, una ecuación, siete instanciaciones interdominio.
          nav_translations:
            Home: Inicio
            Foundations: Fundamentos
            'Three Principles': Los Tres Principios
            'Overview': Visión General
            'P1 — Oscillation': 'P1 — Oscilación'
            'P2 — Self-Reference': 'P2 — Auto-Referencia'
            'P3 — Coupling': 'P3 — Acoplamiento'
            'The Equation': La Ecuación
            'Derivation from Axioms': Derivación desde Axiomas
            'Markovian Embedding': Embedding Markoviano
            'Two-Dimensional Form': Forma Bidimensional
            'Three-Dimensional Form': Forma Tridimensional
            'Reductions to Known Equations': Reducciones a Ecuaciones Conocidas
            Results: Resultados
            'Cross-Domain Interfaces': Interfaces Interdominio
            'Other NLS Systems': Otros Sistemas NLS
            'Baryon Acoustic Oscillations': Oscilaciones Acústicas de Bariones
            'Chladni Cymatics': Cimática de Chladni
            'Gamma-Frequency Entrainment': Entrainment de Frecuencia Gamma
            'Archaeoacoustic Resonance': Resonancia Arqueoacústica
            'State Space Models': Modelos de Espacio de Estados
            'Cosmological Expansion': Expansión Cosmológica
            Methodology: Metodología
            'Structural Realism': Realismo Estructural
            'Limits of Falsification': Límites de la Falsación
            'How to Evaluate This': Cómo Evaluar Esto
            'The Six Criteria': Los Seis Criterios
            Implementation: Implementación
            'Physics Solver (CuPy)': 'Solver de Física (CuPy)'
            'Neural Layer (PyTorch)': 'Capa Neural (PyTorch)'
            Experiments: Experimentos
            'Physics Experiments': Experimentos de Física
            'Neural Experiments': Experimentos Neurales
            'Reader Paths': Rutas de Lectura
            'If you are new': Si eres nuevo
            'If you are from physics': Si vienes de la física
            'If you are from machine learning': Si vienes de machine learning
            'If you are from neuroscience': Si vienes de la neurociencia
            'If you are from philosophy of science': Si vienes de la filosofía de la ciencia
            Paper: Paper
            About: Acerca de
            'Repository Structure': Estructura del Repositorio
            'Contributing': Contribuir
            'AI Assistant Guidelines': Directrices para Asistentes de IA

  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true

markdown_extensions:
  # Standard
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
      toc_depth: 4

  # PyMdown extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md

  - Foundations:
      - 'Three Principles':
          - 'Overview': principles/README.md
          - 'P1 — Oscillation': principles/01-oscillation.md
          - 'P2 — Self-Reference': principles/02-self-reference.md
          - 'P3 — Coupling': principles/03-coupling.md
      - 'The Equation':
          - 'Overview': equation/README.md
          - 'Derivation from Axioms': equation/01-derivation.md
          - 'Markovian Embedding': equation/02-markovian-embedding.md
          - 'Two-Dimensional Form': equation/03-two-dimensional.md
          - 'Three-Dimensional Form': equation/04-three-dimensional.md
          - 'Reductions to Known Equations': equation/05-reductions.md

  - Results:
      - 'Overview': results/README.md
      - 'Anti-Collapse · 2D': results/01-anti-collapse-2d.md
      - 'Spontaneous Crystallization': results/02-spontaneous-crystallization.md
      - 'Vibrational Modes': results/03-vibrational-modes.md
      - 'Anti-Collapse · 3D': results/04-anti-collapse-3d.md
      - 'Bravais Lattice Selection': results/05-bravais-selection.md
      - 'Dimensional Rescaling': results/06-dimensional-rescaling.md
      - 'Temporal–Spatial Asymmetry': results/07-temporal-spatial-asymmetry.md
      - 'Optimization-Collapse Empirical': results/08-optimization-collapse-empirical.md

  - Cross-Domain Interfaces:
      - 'Overview': interfaces/README.md
      - 'Other NLS Systems': interfaces/01-other-nls-systems.md
      - 'Baryon Acoustic Oscillations': interfaces/02-baryon-acoustic.md
      - 'Chladni Cymatics': interfaces/03-chladni-cymatics.md
      - 'Gamma-Frequency Entrainment': interfaces/04-gamma-entrainment.md
      - 'Archaeoacoustic Resonance': interfaces/05-archaeoacoustic-resonance.md
      - 'State Space Models': interfaces/06-state-space-models.md
      - 'Cosmological Expansion': interfaces/07-cosmological-expansion.md

  - Methodology:
      - 'Overview': methodology/README.md
      - 'Structural Realism': methodology/01-structural-realism.md
      - 'Limits of Falsification': methodology/02-limits-of-falsification.md
      - 'How to Evaluate This': methodology/03-how-to-evaluate-this.md
      - 'The Six Criteria': methodology/04-the-six-criteria.md

  - Implementation:
      - 'Overview': implementation/README.md
      - 'Physics Solver (CuPy)': implementation/physics/README.md
      - 'Neural Layer (PyTorch)': implementation/neural/README.md

  - Experiments:
      - 'Overview': experiments/README.md
      - 'Physics Experiments': experiments/physics/README.md
      - 'Neural Experiments': experiments/neural/README.md
      - 'Scale-Up Results (70M, enwik8)': outputs/scale_up/scale_up_results.md
      - 'Long-Horizon Run (1.5M)': outputs/long_training/long_training_results.md

  - Reader Paths:
      - 'Overview': paths/README.md
      - 'If you are new': paths/if-you-are-new.md
      - 'If you are from physics': paths/if-you-are-from-physics.md
      - 'If you are from machine learning': paths/if-you-are-from-ml.md
      - 'If you are from neuroscience': paths/if-you-are-from-neuroscience.md
      - 'If you are from philosophy of science': paths/if-you-are-from-philosophy.md

  - Paper: paper/manuscript.md

  - About:
      - 'Repository Structure': STRUCTURE.md
      - 'Contributing': CONTRIBUTING.md
      - 'AI Assistant Guidelines': CLAUDE.md

watch:
  - principles
  - equation
  - results
  - interfaces
  - methodology
  - implementation
  - experiments
  - paths
  - paper
  - outputs
  - _docs_assets
