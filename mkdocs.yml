            'How to Evaluate This': Como Avaliar Isto
            'The Six Criteria': Os Seis Critérios
            Implementation: Implementação
            'Physics Solver (CuPy)': 'Solver de Física (CuPy)'
            'Neural Layer (PyTorch)': 'Camada Neural (PyTorch)'
            Experiments: Experimentos
            'Physics Experiments': Experimentos de Física
            'Neural Experiments': Experimentos Neurais
            'Reader Paths': Trilhas de Leitura
            'If you are new': Se você é novo nisso
            'If you are from physics': Se você vem da física
