site_name: mnsm
site_description: >-
  Memory-Nonlinear State Models — three structural principles, one equation,
  seventeen cross-domain instantiations. Derived from observational axioms about
  persistence, not from prior ML literature.
site_url: https://qrv0.github.io/mnsm/
site_author: qrv0
copyright: '© 2026 qrv0 — Code: <a href="LICENSE">MIT</a>, Documentation: <a href="LICENSE-docs">CC BY 4.0</a>'

repo_url: https://github.com/qrv0/mnsm
repo_name: qrv0/mnsm
edit_uri: edit/main/

# Read content from the repository root so the existing folder structure
# (principles/, equation/, results/, interfaces/, methodology/, etc.) is
# the single source of truth. Site-specific assets live in _docs_assets/.
docs_dir: docs
site_dir: site

# Exclude things that shouldn't be served as pages
exclude_docs: |
  .venv/
  .git/
  .github/
  .hf_staging/
  __pycache__/
  scripts/
  experiments/neural/enwik8*
  experiments/neural/tinyshakespeare.txt
  outputs/**/*.pt
  outputs/**/*.safetensors
  outputs/**/history.json
  outputs/**/raw_results.json
  outputs/scale_up_run.log
  requirements*.txt
  pyproject.toml
  CITATION.cff
  paper/figures/

theme:
  name: material
  language: en
  custom_dir: _docs_assets/overrides
  favicon: _docs_assets/favicon.svg
  logo: _docs_assets/favicon.svg

  features:
    # Navigation
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress

    # Table of contents
    - toc.follow
    - toc.integrate

    # Search
    - search.suggest
    - search.highlight
    - search.share

    # Content
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - content.action.edit
    - content.action.view
    - content.footnote.tooltips

    # Announce bar
    - announce.dismiss

  palette:
    # Light mode — graphite on paper
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    # Dark mode — charcoal with warm white text
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  font:
    text: Inter
    code: JetBrains Mono

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

# Custom CSS for polish
extra_css:
  - _docs_assets/extra.css

# MathJax for equations (the work has heavy LaTeX content)
extra_javascript:
  - _docs_assets/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - _docs_assets/path-enhance.js
  - _docs_assets/wheel-interactive.js
  - _docs_assets/compare.js
  - _docs_assets/predictions-board.js
  - _docs_assets/plotly-loader.js

extra:
  # Remove "Made with Material" notice
  generator: false

  # Social links in footer
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/qrv0/mnsm
      name: GitHub repository
    - icon: simple/huggingface
      link: https://huggingface.co/qrv0/mnsm-memnls-70m-enwik8
      name: Memory-NLS 70M on HuggingFace
    - icon: simple/huggingface
      link: https://huggingface.co/qrv0/mnsm-transformer-70m-enwik8
      name: Transformer baseline 70M on HuggingFace

  # Status badge for announce bar (optional)
  status:
    new: Recently added
    deprecated: Deprecated

hooks:
  - hooks/build_index.py

plugins:
  - search:
      lang: [en, pt, es]
      separator: '[\s​\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      reconfigure_search: true
      languages:
