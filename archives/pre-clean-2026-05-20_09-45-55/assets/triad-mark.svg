<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" width="480" height="360" role="img" aria-label="The triad: three structural principles forming a triangle">
  <style>
    .stroke { stroke: #1a1a1a; }
    .fill { fill: #1a1a1a; }
    .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 600; fill: #1a1a1a; }
    .sub { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 400; fill: #666; }
    @media (prefers-color-scheme: dark) {
      .stroke { stroke: #ffffff; }
      .fill { fill: #ffffff; }
      .label { fill: #ffffff; }
      .sub { fill: #aaaaaa; }
    }

    @keyframes pulse {
      0%, 100% { r: 7; opacity: 0.9; }
      50%      { r: 12; opacity: 1; }
    }

    .v1 { animation: pulse 3s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .v2 { animation: pulse 3s ease-in-out infinite 1s; transform-origin: center; transform-box: fill-box; }
    .v3 { animation: pulse 3s ease-in-out infinite 2s; transform-origin: center; transform-box: fill-box; }

    @keyframes edgePulse {
      0%, 100% { stroke-opacity: 0.5; }
      50%      { stroke-opacity: 1; }
    }
    .triangle { animation: edgePulse 3s ease-in-out infinite; }
  </style>

  <polygon points="240,60 70,310 410,310"
           fill="none"
           class="stroke triangle"
           stroke-width="2.5"
           stroke-linejoin="round" />

  <circle cx="240" cy="60" r="7" class="fill v1" />
  <circle cx="410" cy="310" r="7" class="fill v2" />
  <circle cx="70" cy="310" r="7" class="fill v3" />

  <text x="240" y="40" text-anchor="middle" font-size="22" class="label">P1</text>
  <text x="240" y="22" text-anchor="middle" font-size="13" class="sub">oscillation</text>

  <text x="422" y="334" text-anchor="start" font-size="22" class="label">P2</text>
  <text x="422" y="350" text-anchor="start" font-size="13" class="sub">self-reference</text>

  <text x="58" y="334" text-anchor="end" font-size="22" class="label">P3</text>
  <text x="58" y="350" text-anchor="end" font-size="13" class="sub">coupling</text>

  <text x="240" y="200" text-anchor="middle" font-size="18" font-style="italic" class="sub">triad</text>
</svg>
